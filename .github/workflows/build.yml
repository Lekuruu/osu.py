name: Build

on:
    release:
        types: [published]
    push:
        branches:
            - main
    pull_request:
        branches:
            - "*"

env:
    PROJECT_NAME: osu

jobs:
    check:
        runs-on: ubuntu-latest
        strategy:
            fail-fast: false
            matrix:
                python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]

        steps:
            - uses: actions/checkout@v6
              with:
                  fetch-depth: 9
                  submodules: false

            - name: Use Python ${{ matrix.python-version }}
              uses: actions/setup-python@v6
              with:
                  python-version: ${{ matrix.python-version }}

            - uses: actions/cache@v5
              id: depcache
              with:
                  path: deps
                  key: requirements-pip-${{ matrix.python-version }}-${{ hashFiles('pyproject.toml', 'requirements.txt') }}

            - name: Download dependencies
              if: steps.depcache.outputs.cache-hit != 'true'
              run: |
                  pip download --dest=deps -r requirements.txt
                  pip download --dest=deps setuptools wheel black mypy types-python-dateutil build

            - name: Install dependencies
              run: |
                  pip install -U --no-index --find-links=deps -r requirements.txt
                  pip install -U --no-index --find-links=deps black mypy types-python-dateutil build
                  pip install -e . --no-index --find-links=deps

            - name: Run linters
              run: |
                  echo "Running linters"

                  black --check . 2>&1

            - name: Run type checker
              run: |
                  mypy --install-types --non-interactive . 2>&1

            - name: Run test script
              run: |
                  python test.py

    build:
        runs-on: ubuntu-latest
        needs: check
        if: github.event_name == 'push' || github.event_name == 'release'
        steps:
            - uses: actions/checkout@v6

            - name: Use Python 3.10
              uses: actions/setup-python@v6
              with:
                  python-version: "3.10"

            - name: Install dependencies
              run: |
                  pip install build

            - name: Create local build
              run: |
                  python -m build

            - name: Upload distribution folder
              uses: actions/upload-artifact@v7
              with:
                  name: dist
                  path: dist

    publish:
        runs-on: ubuntu-latest
        needs: [check, build]
        if: github.event_name == 'release'
        steps:
            - uses: actions/checkout@v6

            - name: Use Python 3.10
              uses: actions/setup-python@v6
              with:
                  python-version: "3.10"

            - name: Install dependencies
              run: |
                  pip install build twine

            - name: Create local build
              run: |
                  python -m build

            - name: Publish distribution to PyPI
              run: |
                  twine upload -r pypi dist/*
              env:
                  TWINE_USERNAME: __token__
                  TWINE_PASSWORD: ${{ secrets.pypi_password }}
